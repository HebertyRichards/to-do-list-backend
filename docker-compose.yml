services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - public
    ports:
      - "${APP_PORT}:${APP_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://localhost:{os.environ[\\\"APP_PORT\\\"]}/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ../to-do-list
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../to-do-list/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
